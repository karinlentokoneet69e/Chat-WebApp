<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Toksisin keskustelu-alusta</title>
</head>
<body>

  <!-- Kirjautumis ja registeröitymis formit -->
  <div id="loginScreen" class="screen">
    <div id="loginForm">
      <input id="username" type="text" placeholder="Username"><br>
      <input id="password" type="password" placeholder="Password" onkeypress="if(event.keyCode==13) login()"><br>
      <button onclick="login()">Login</button>
      <p><a href="#" onclick="showRegister()">Register</a></p>
      <p id="loginError" class="error"></p>
    </div>
    
    <div id="registerForm" style="display:none;">
      <input id="regUsername" type="text" placeholder="Username"><br>
      <input id="regPassword" type="password" placeholder="Password" onkeypress="if(event.keyCode==13) register()"><br>
      <button onclick="register()">Register</button>
      <p><a href="#" onclick="showLogin()">Login</a></p>
      <p id="registerError" class="error"></p>
    </div>
  </div>
  <!-- Kirjautumis ja registeröitymis formit -->

  <!-- Chat osuus -->
  <div id="chatScreen" class="screen" style="display:none;">
    <button onclick="logout()" class="logout-btn">Kirjaudu ulos <strong id="currentUser"></strong></button>
    <br><br><br>
    <input id="msg" placeholder="Message" onkeypress="if(event.keyCode==13) send()">
    <button onclick="send()">Chat</button>
    <ul id="chat"></ul>
  </div>
  <!-- Chat osuus -->

  <script src="script.js"></script>
</body>
</html>
